name: Release Windows EXE

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v1.0.0)"
        required: true
      prerelease:
        description: "Mark this release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Build EXE
        run: uv run pyinstaller --onefile --noconsole --name "To-do" main.py

      - name: Prepare release asset
        id: package
        shell: pwsh
        run: |
          $assetName = "To-do.exe"
          Copy-Item -LiteralPath "dist\To-do.exe" -Destination "dist\$assetName" -Force
          "asset_name=$assetName" >> $env:GITHUB_OUTPUT

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist\${{ steps.package.outputs.asset_name }}

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $args = @(
            'release', 'create', '${{ inputs.tag }}',
            "dist\${{ steps.package.outputs.asset_name }}",
            '--title', '${{ inputs.tag }}',
            '--generate-notes',
            '--target', '${{ github.sha }}'
          )

          if ('${{ inputs.prerelease }}' -eq 'true') {
            $args += '--prerelease'
          }

          & gh @args
