name: Release Windows EXE

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: "Mark this release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Read project version
        id: version
        shell: pwsh
        run: |
          $version = (uv version --short).Trim()
          if (-not $version) {
            throw "Could not read project version from pyproject.toml"
          }

          $tag = "v$version"
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "Using release tag $tag"

      - name: Check release tag
        shell: pwsh
        run: |
          $tag = '${{ steps.version.outputs.tag }}'
          $existingTag = git ls-remote --tags --refs origin "refs/tags/$tag"

          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          if ($existingTag) {
            throw "Tag $tag already exists. Bump the project version with 'uv version' before releasing."
          }

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Build EXE
        run: uv run pyinstaller --onefile --noconsole --name "To-do" main.py

      - name: Prepare release asset
        id: package
        shell: pwsh
        run: |
          $assetName = "To-do.exe"
          if (-not (Test-Path -LiteralPath "dist\$assetName")) {
            throw "Release asset dist\$assetName was not found."
          }

          "asset_name=$assetName" >> $env:GITHUB_OUTPUT

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist\${{ steps.package.outputs.asset_name }}

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $args = @(
            'release', 'create', '${{ steps.version.outputs.tag }}',
            "dist\${{ steps.package.outputs.asset_name }}",
            '--title', '${{ steps.version.outputs.tag }}',
            '--generate-notes',
            '--target', '${{ github.sha }}'
          )

          if ('${{ inputs.prerelease }}' -eq 'true') {
            $args += '--prerelease'
          }

          & gh @args
